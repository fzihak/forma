name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all platforms
        working-directory: ./forma-cli
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -o dist/forma-darwin-arm64  .
          GOOS=darwin  GOARCH=amd64 go build -o dist/forma-darwin-amd64  .
          GOOS=linux   GOARCH=amd64 go build -o dist/forma-linux-amd64   .
          GOOS=windows GOARCH=amd64 go build -o dist/forma-windows-amd64.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
